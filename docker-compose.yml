services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.app
    container_name: deepdivenote-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://deepdivenote:deepdivenote_dev_password@postgres:5432/deepdivenote
      REDIS_URL: redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - ddn-network

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    container_name: deepdivenote-worker
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://deepdivenote:deepdivenote_dev_password@postgres:5432/deepdivenote
      REDIS_URL: redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - ddn-network

  postgres:
    image: postgres:16-alpine
    container_name: deepdivenote-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: deepdivenote
      POSTGRES_PASSWORD: deepdivenote_dev_password
      POSTGRES_DB: deepdivenote
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U deepdivenote"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ddn-network

  redis:
    image: redis:7-alpine
    container_name: deepdivenote-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - ddn-network

networks:
  ddn-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
