services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: deepdivenote-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      QWEN_API_KEY: ${QWEN_API_KEY}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      ZENMUX_API_KEY: ${ZENMUX_API_KEY}
      ALIYUN_ACCESS_KEY_ID: ${ALIYUN_ACCESS_KEY_ID}
      ALIYUN_ACCESS_KEY_SECRET: ${ALIYUN_ACCESS_KEY_SECRET}
      ALIYUN_OSS_REGION: ${ALIYUN_OSS_REGION}
      ALIYUN_OSS_BUCKET: ${ALIYUN_OSS_BUCKET}
      ALIYUN_OSS_ENDPOINT: ${ALIYUN_OSS_ENDPOINT}
    depends_on:
      - redis

  # 后台转写 Worker
  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: deepdivenote-worker
    restart: unless-stopped
    command: ["npm", "run", "worker"]
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      QWEN_API_KEY: ${QWEN_API_KEY}
    depends_on:
      - redis

  redis:
    image: redis:7-alpine
    container_name: deepdivenote-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

volumes:
  redis_data:
