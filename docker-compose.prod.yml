services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.app
    container_name: deepdivenote-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://deepdivenote:deepdivenote_dev_password@postgres:5432/deepdivenote
      REDIS_URL: redis://redis:6379
      QWEN_API_KEY: ${QWEN_API_KEY}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      ZENMUX_API_KEY: ${ZENMUX_API_KEY}
      ALIYUN_ACCESS_KEY_ID: ${ALIYUN_ACCESS_KEY_ID}
      ALIYUN_ACCESS_KEY_SECRET: ${ALIYUN_ACCESS_KEY_SECRET}
      ALIYUN_OSS_REGION: ${ALIYUN_OSS_REGION}
      ALIYUN_OSS_BUCKET: ${ALIYUN_OSS_BUCKET}
      ALIYUN_OSS_ENDPOINT: ${ALIYUN_OSS_ENDPOINT}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # 后台转写 Worker
  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    container_name: deepdivenote-worker
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://deepdivenote:deepdivenote_dev_password@postgres:5432/deepdivenote
      REDIS_URL: redis://redis:6379
      QWEN_API_KEY: ${QWEN_API_KEY}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    container_name: deepdivenote-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: deepdivenote
      POSTGRES_PASSWORD: deepdivenote_dev_password
      POSTGRES_DB: deepdivenote
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U deepdivenote"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: deepdivenote-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  nginx:
    image: nginx:alpine
    container_name: deepdivenote-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./deploy/ssl:/etc/nginx/ssl:ro
    depends_on:
      - app

volumes:
  postgres_data:
  redis_data:
